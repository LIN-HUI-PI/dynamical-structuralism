<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S-Line · Tension Field</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0e0c0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Georgia', serif;
  }

  canvas {
    display: block;
  }

  .label {
    margin-top: 2rem;
    color: #5a5550;
    font-size: 0.78rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-align: center;
  }

  .label span {
    display: block;
    margin-top: 0.3rem;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    color: #3a3530;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div class="label">
  S-Line · Tension Field Dynamics
  <span>張力場重新分布 · 膜跟著變形</span>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const SIZE = Math.min(window.innerWidth, window.innerHeight, 480);
canvas.width = SIZE;
canvas.height = SIZE;

const W = canvas.width;
const H = canvas.height;
const CX = W / 2;
const CY = H / 2;

let t = 0;

// Tension field: two sides with a disturbance that propagates
// Left side = side A, Right side = side B
// S-line is the boundary solution of T(x,t)

function getTensionField(x, y, time) {
  // Normalized coords -1 to 1
  const nx = (x - CX) / (W * 0.45);
  const ny = (y - CY) / (H * 0.45);

  // Side A (left): base tension + disturbance
  // Disturbance: a slow wave emanating from upper-left
  const distA = 0.3 * Math.sin(time * 0.7 + nx * 2.5) * Math.exp(-Math.pow(nx + 0.3, 2) * 2);
  const tensionA = Math.exp(-Math.pow(nx + 0.5, 2) * 1.5 - Math.pow(ny, 2) * 1.2) + distA;

  // Side B (right): base tension + slower response
  const distB = 0.2 * Math.sin(time * 0.5 - nx * 2.0 + 1.2) * Math.exp(-Math.pow(nx - 0.3, 2) * 2);
  const tensionB = Math.exp(-Math.pow(nx - 0.5, 2) * 1.5 - Math.pow(ny, 2) * 1.2) + distB;

  return { tensionA, tensionB };
}

// S-line: find x where tensionA = tensionB for each y
function getSLineX(yPixel, time) {
  const ny = (yPixel - CY) / (H * 0.45);

  // Binary search for equilibrium x
  let lo = 0, hi = W;
  for (let i = 0; i < 20; i++) {
    const mid = (lo + hi) / 2;
    const nx = (mid - CX) / (W * 0.45);
    const distA = 0.3 * Math.sin(time * 0.7 + nx * 2.5) * Math.exp(-Math.pow(nx + 0.3, 2) * 2);
    const tensionA = Math.exp(-Math.pow(nx + 0.5, 2) * 1.5 - Math.pow(ny, 2) * 1.2) + distA;
    const distB = 0.2 * Math.sin(time * 0.5 - nx * 2.0 + 1.2) * Math.exp(-Math.pow(nx - 0.3, 2) * 2);
    const tensionB = Math.exp(-Math.pow(nx - 0.5, 2) * 1.5 - Math.pow(ny, 2) * 1.2) + distB;
    if (tensionA > tensionB) lo = mid; else hi = mid;
  }
  return (lo + hi) / 2;
}

function drawField(time) {
  // Draw tension field as particle density / flow lines
  const step = 8;
  for (let x = 0; x < W; x += step) {
    for (let y = 0; y < H; y += step) {
      const { tensionA, tensionB } = getTensionField(x, y, time);
      const total = tensionA + tensionB;
      const balance = tensionA - tensionB; // positive = A side, negative = B side

      const sx = getSLineX(y, time);
      const distToLine = Math.abs(x - sx);

      // Particle brightness based on tension
      const brightness = Math.min(total * 80, 60);
      const alpha = Math.max(0, brightness * 0.012);

      if (x < sx) {
        // Side A — warm
        const r = 180 + tensionA * 40;
        const g = 160 + tensionA * 20;
        const b = 120;
        ctx.fillStyle = `rgba(${Math.floor(r)},${Math.floor(g)},${Math.floor(b)},${alpha})`;
      } else {
        // Side B — cool
        const r = 100;
        const g = 130 + tensionB * 20;
        const b = 160 + tensionB * 40;
        ctx.fillStyle = `rgba(${Math.floor(r)},${Math.floor(g)},${Math.floor(b)},${alpha})`;
      }

      ctx.fillRect(x, y, step - 1, step - 1);
    }
  }
}

function drawSLine(time) {
  // Draw the S-line as the boundary between the two tension fields
  const points = [];
  const steps = 120;
  for (let i = 0; i <= steps; i++) {
    const y = (i / steps) * H;
    const x = getSLineX(y, time);
    points.push({ x, y });
  }

  // Glow effect — multiple passes
  const glowLayers = [
    { width: 12, alpha: 0.04, color: [255, 220, 160] },
    { width: 6,  alpha: 0.08, color: [255, 230, 180] },
    { width: 2,  alpha: 0.6,  color: [240, 220, 180] },
    { width: 1,  alpha: 0.9,  color: [255, 245, 220] },
  ];

  glowLayers.forEach(({ width, alpha, color }) => {
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) {
      const prev = points[i - 1];
      const curr = points[i];
      const mx = (prev.x + curr.x) / 2;
      const my = (prev.y + curr.y) / 2;
      ctx.quadraticCurveTo(prev.x, prev.y, mx, my);
    }
    ctx.strokeStyle = `rgba(${color[0]},${color[1]},${color[2]},${alpha})`;
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.stroke();
  });
}

function drawParticlesOnLine(time) {
  // Small particles flowing along the S-line
  const numParticles = 12;
  for (let i = 0; i < numParticles; i++) {
    const phase = (i / numParticles + time * 0.08) % 1;
    const y = phase * H;
    const x = getSLineX(y, time);

    const alpha = Math.sin(phase * Math.PI) * 0.7;
    const size = 1.5 + Math.sin(phase * Math.PI) * 1.5;

    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 245, 200, ${alpha})`;
    ctx.fill();
  }
}

function drawPIPMoment(time) {
  // Occasionally show a PIP moment — a brief perturbation in the field
  const pipCycle = 8; // seconds
  const pipPhase = (time * 0.15) % 1;
  const pipActive = pipPhase > 0.6 && pipPhase < 0.85;

  if (pipActive) {
    const intensity = Math.sin((pipPhase - 0.6) / 0.25 * Math.PI);
    const pipY = H * 0.35 + Math.sin(time * 0.3) * H * 0.1;
    const pipX = getSLineX(pipY, time);

    // Ripple at PIP point
    const rippleR = intensity * 30;
    const grad = ctx.createRadialGradient(pipX, pipY, 0, pipX, pipY, rippleR);
    grad.addColorStop(0, `rgba(255, 200, 120, ${0.3 * intensity})`);
    grad.addColorStop(1, `rgba(255, 200, 120, 0)`);
    ctx.beginPath();
    ctx.arc(pipX, pipY, rippleR, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Label
    if (intensity > 0.4) {
      ctx.fillStyle = `rgba(200, 170, 100, ${intensity * 0.8})`;
      ctx.font = `${Math.floor(9 + intensity * 2)}px Georgia`;
      ctx.fillText('PIP', pipX + 12, pipY - 8);
    }
  }
}

function draw(timestamp) {
  t = timestamp * 0.001;

  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#0e0c0a';
  ctx.fillRect(0, 0, W, H);

  // Draw tension fields
  drawField(t);

  // Draw S-line
  drawSLine(t);

  // Particles on line
  drawParticlesOnLine(t);

  // PIP moment
  drawPIPMoment(t);

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
